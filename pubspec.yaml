name: unireax_mobile_diplom
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.0.0
  http_interceptor: ^1.0.0
  shared_preferences: ^2.2.0
  provider: ^6.0.0
  url_launcher: ^6.2.1
  pdf: ^3.10.4
  printing: ^5.11.2
  path_provider: ^2.1.1
  path: ^1.9.0
  file_picker: ^8.1.2
  open_filex: ^4.5.0
  share_plus: ^12.0.1
  intl: ^0.20.2
  webview_flutter: ^4.4.4
  webview_flutter_android: ^3.12.1
  webview_flutter_wkwebview: ^3.9.1
  uuid: ^4.3.3
  android_intent_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/unireax_logo.png"  
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/unireax_logo.png"  

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/arial_black.ttf
    - assets/fonts/arial.ttf
    - assets/fonts/arialbd.ttf
    - assets/icon/unireax_logo.png  